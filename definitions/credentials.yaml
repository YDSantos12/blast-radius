credentials:
  - type: github_pat
    display_name: "Token de Acesso Pessoal do GitHub (PAT)"
    default_tier: "REVOKE_NOW"
    authority_type: "github"
    revocation_url: "https://github.com/settings/tokens"
    revocation_command: "gh auth refresh"
    notes: >
      PATs concedem acesso a repositórios e organizações.
      Escopo desconhecido offline — assume-se acesso total.
    token_patterns:
      - "^ghp_[A-Za-z0-9]{36}$"
      - "^github_pat_[A-Za-z0-9_]{22,255}$"

  - type: github_oauth
    display_name: "Token OAuth do GitHub"
    default_tier: "REVOKE_NOW"
    authority_type: "github"
    revocation_url: "https://github.com/settings/apps/authorizations"
    revocation_command: "gh auth logout && gh auth login"
    notes: >
      Usado pelo GitHub CLI e Desktop. Normalmente escopo amplo.
      Prefixo gho_ — escopo real requer chamada à API online.
    token_patterns:
      - "^gho_[A-Za-z0-9]{36}$"

  - type: github_app_token
    display_name: "Token de Instalação do GitHub App"
    default_tier: "REVOKE_NOW"
    authority_type: "github"
    revocation_url: "https://github.com/settings/installations"
    revocation_command: ""
    notes: >
      Expira mas pode ter acesso amplo à organização enquanto válido.
      Prefixo ghs_. Revogar a instalação do app imediatamente.
    token_patterns:
      - "^ghs_[A-Za-z0-9]{36}$"

  - type: ssh_key
    display_name: "Chave SSH Privada"
    default_tier: "REVOKE_NOW"
    authority_type: "ssh"
    revocation_url: "https://github.com/settings/keys"
    revocation_command: "ssh-keygen -R <host>"
    notes: >
      Chave sem senha fornece acesso imediato a todos os hosts
      configurados. Revogar em todos os serviços associados.
      Tier real depende de has_passphrase e known_hosts — veja
      as regras do engine.

  - type: aws_longterm_key
    display_name: "Chave IAM AWS de Longo Prazo"
    default_tier: "REVOKE_NOW"
    authority_type: "aws"
    revocation_url: "https://console.aws.amazon.com/iam/home#/security_credentials"
    revocation_command: "aws iam delete-access-key --access-key-id <KEY_ID>"
    notes: >
      Não expira. Acesso indefinido até revogação explícita.
      Prefixo AKIA. Revogar imediatamente e auditar CloudTrail.

  - type: aws_session_token
    display_name: "Token de Sessão AWS STS"
    default_tier: "ROTATE"
    authority_type: "aws"
    revocation_url: "https://console.aws.amazon.com/iam/home#/security_credentials"
    revocation_command: "aws sts get-caller-identity"
    notes: >
      Expira naturalmente. Verificar se a role subjacente
      foi comprometida. Prefixo ASIA.

  - type: aws_key
    display_name: "Credencial AWS IAM"
    default_tier: "REVOKE_NOW"
    authority_type: "aws"
    revocation_url: "https://console.aws.amazon.com/iam/home#/security_credentials"
    revocation_command: "aws iam delete-access-key --access-key-id <KEY_ID>"
    notes: >
      Credencial AWS encontrada. Verificar se é chave de longo prazo
      (AKIA*) ou token de sessão (ASIA*). Revogar imediatamente e
      auditar CloudTrail para atividade não autorizada na janela do incidente.

  - type: azure_token
    display_name: "Token de Acesso Azure"
    default_tier: "ROTATE"
    authority_type: "azure"
    revocation_url: "https://portal.azure.com/#view/Microsoft_AAD_IAM/ActiveDirectoryMenuBlade"
    revocation_command: "az account clear && az login"
    notes: >
      Pode dar acesso a subscriptions e recursos críticos.
      Verificar tenant_id e subscription_id nos metadados.

  - type: gcloud_token
    display_name: "Credencial do Google Cloud CLI"
    default_tier: "ROTATE"
    authority_type: "gcloud"
    revocation_url: "https://console.cloud.google.com/iam-admin/iam"
    revocation_command: "gcloud auth revoke --all"
    notes: >
      Pode dar acesso a projetos GCP inteiros.
      Verificar quais service accounts estavam autorizadas.

  - type: npm_token
    display_name: "Token do Registro npm"
    default_tier: "REVOKE_NOW"
    authority_type: "npm"
    revocation_url: "https://www.npmjs.com/settings/~/tokens"
    revocation_command: "npm token revoke <TOKEN_ID>"
    notes: >
      Com acesso de publicação permite distribuir versões
      maliciosas de qualquer pacote do mantenedor.
    token_patterns:
      - "^npm_[A-Za-z0-9]{36}$"
      - "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

  - type: pypi_token
    display_name: "Token de API do PyPI"
    default_tier: "REVOKE_NOW"
    authority_type: "pypi"
    revocation_url: "https://pypi.org/manage/account/token/"
    revocation_command: ""
    notes: >
      Permite publicação de pacotes Python comprometidos.
      Prefixo pypi- obrigatório.
    token_patterns:
      - "^pypi-[A-Za-z0-9_-]{50,}$"

  - type: docker_credential
    display_name: "Credencial de Registro Docker"
    default_tier: "ROTATE"
    authority_type: "docker"
    revocation_url: "https://hub.docker.com/settings/security"
    revocation_command: "docker logout"
    notes: >
      Permite push de imagens maliciosas para registries.
      Se cred_store estiver definido, o valor está no
      keychain do sistema — inspeção manual necessária.

  - type: env_secret
    display_name: "Segredo em Variável de Ambiente"
    default_tier: "AUDIT"
    authority_type: "env"
    revocation_url: ""
    revocation_command: ""
    notes: >
      Acessível a qualquer processo no contexto do usuário.
      Passou pelo filtro de falso positivo — provavelmente
      um segredo real.

  - type: vscode_state_secret
    display_name: "Segredo no State DB do VS Code"
    default_tier: "ROTATE"
    authority_type: "vscode"
    revocation_url: ""
    revocation_command: ""
    notes: >
      Extensões armazenam tokens no state.vscdb.
      Verificar quais extensões tinham acesso ao segredo
      e revogar os tokens correspondentes nos serviços.
